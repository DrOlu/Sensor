name: Sync Watchdog

on:
  schedule:
    # Check 0 */3 * * * — sync threshold is 420min
    - cron: "0 */3 * * *"
  workflow_dispatch:

jobs:
  watchdog:
    runs-on: ubuntu-latest
    steps:
      - name: Check last sync and alert if overdue
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          REPO="DrOlu/Sensor"
          WORKFLOW_FILE="build.yml"
          LABEL="Sensor"
          MAX_AGE=420
          MULTICA_WEBHOOK="https://api.multica.ai/api/webhooks/autopilots/awt_azjpEQ-2NJYENF86fUIV8Zm6pWE7_0qanO76WOaG0kw"

          # Get last run time
          LAST_RUN=$(gh run list \
            --repo "$REPO" \
            --workflow "$WORKFLOW_FILE" \
            --limit 1 \
            --json createdAt \
            --jq ".[0].createdAt" 2>/dev/null || echo "")

          if [ -z "$LAST_RUN" ]; then
            echo "Could not fetch last run time — skipping"
            exit 0
          fi

          # Calculate age in minutes (Linux date)
          LAST_TS=$(date -d "$LAST_RUN" +%s)
          NOW_TS=$(date +%s)
          AGE=$(( (NOW_TS - LAST_TS) / 60 ))

          echo "Last $LABEL sync: $LAST_RUN (${AGE}min ago, threshold ${MAX_AGE}min)"

          if [ "$AGE" -le "$MAX_AGE" ]; then
            echo "OK — sync is current"
            exit 0
          fi

          echo "OVERDUE by $((AGE - MAX_AGE))min — triggering sync and alerting"

          # Telegram alert
          curl -sS -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"⚠️ ${LABEL} sync overdue!\\nLast run: ${AGE}min ago (threshold: ${MAX_AGE}min)\\nTriggering sync now...\",\"parse_mode\":\"HTML\"}" \
            > /dev/null && echo "Telegram alert sent"

          # Notify Multica failure autopilot
          curl -sS -X POST "$MULTICA_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"action\":\"skipped\",\"workflow_run\":{\"id\":\"watchdog-${AGE}\",\"name\":\"${LABEL} Sync (SKIPPED — ${AGE}min overdue)\",\"conclusion\":\"failure\",\"html_url\":\"https://github.com/${REPO}/actions\",\"head_branch\":\"main\"},\"repository\":{\"full_name\":\"${REPO}\",\"name\":\"${LABEL}\"}}" \
            > /dev/null && echo "Multica notified"

          # Trigger the sync
          gh workflow run "sync-upstream.yml" --repo "$REPO" --ref main
          echo "Sync dispatched"

          # Confirm dispatch
          sleep 10
          NEW_RUN=$(gh run list --repo "$REPO" --workflow "sync-upstream.yml" --limit 1 --json status,createdAt --jq ".[0]")
          echo "New run: $NEW_RUN"

          # Success Telegram
          curl -sS -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"✅ ${LABEL} sync triggered by watchdog — now running\",\"parse_mode\":\"HTML\"}" \
            > /dev/null && echo "Telegram success sent"
