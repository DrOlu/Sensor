name: self-heal

on:
  schedule:
    # Run every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  heal:
    name: Check and restore critical workflow files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check and restore critical workflow files
        id: heal
        run: |
          CHANGED=false

          # ── Ensure generate-release-note.test.cjs exists ─────────────────
          if [ ! -f ".github/scripts/generate-release-note.test.cjs" ]; then
            echo "generate-release-note.test.cjs missing — restoring stub"
            cat > .github/scripts/generate-release-note.test.cjs <<'STUB'
// Auto-restored by self-heal workflow
// Stub for generate-release-note tests
'use strict';
STUB
            CHANGED=true
          fi

          # ── Fix netcatty in locale strings ────────────────────────────────
          LOCALE_FILES=$(find application/i18n/locales -name '*.ts' 2>/dev/null)
          if [ -n "$LOCALE_FILES" ]; then
            echo "$LOCALE_FILES" | xargs sed -i \
              -e 's|launch netcatty from|launch Sensor from|g' \
              -e 's|netcatty-external|sensor-external|g' \
              -e "s|NetCatty\'s defaults|Sensor\'s defaults|g" \
              -e "s|NetCatty 默认|Sensor 默认|g" \
              -e "s|NetCatty 預設|Sensor 預設|g" \
              -e "s|NetCatty по умолчанию|Sensor по умолчанию|g" \
              2>/dev/null || true
            LOCALE_CHANGES=$(grep -rl 'netcatty\|NetCatty' application/i18n/locales/ 2>/dev/null | wc -l || echo 0)
            if [ "$LOCALE_CHANGES" -gt 0 ]; then
              echo "Fixed netcatty in $LOCALE_CHANGES locale files"
              CHANGED=true
            fi
          fi

          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"

      - name: Commit and push fixes
        if: steps.heal.outputs.changed == 'true'
        run: |
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "fix(self-heal): restore critical files and fix netcatty locale strings"
            git push origin main
          fi

      - name: Report status
        run: |
          if [ "${{ steps.heal.outputs.changed }}" = "true" ]; then
            echo "::notice::Self-heal made repairs — check commit history for details."
          else
            echo "All checks passed — no repairs needed."
          fi
