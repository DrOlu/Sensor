name: Sync Upstream

on:
  schedule:
    # Run every 4 hours — netcatty releases several times per week
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force sync even if no new upstream commits"
        type: boolean
        default: false
      create_tag:
        description: "Tag to create after sync (e.g. v1.1.61) — leave blank for auto-bump"
        type: string
        default: ""

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'DrOlu'

    steps:
      - name: Checkout Sensor
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # PAT_TOKEN required to push workflow file changes back to main.
          # GITHUB_TOKEN cannot push to .github/workflows/.
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/binaricat/netcatty.git
          git fetch upstream main --depth=1000

      - name: Check for upstream changes
        id: check
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          set -e
          FORCE="${{ github.event.inputs.force }}"
          if [ "$FORCE" = "true" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "new_upstream_release=false" >> "$GITHUB_OUTPUT"
            echo "Force sync requested."
            exit 0
          fi

          # Use the SHA recorded in the last sync commit message as the baseline.
          LAST_SYNCED_SHA=$(git log origin/main --oneline --grep="^sync: upstream Netcatty @" -1 \
            | grep -oE "[0-9a-f]{8,40}" | tail -1 || echo "")
          UPSTREAM_HEAD=$(git rev-parse upstream/main)

          echo "Last synced upstream SHA: ${LAST_SYNCED_SHA:-none}"
          echo "Upstream HEAD:            ${UPSTREAM_HEAD}"

          if [ -z "$LAST_SYNCED_SHA" ] || [ "$UPSTREAM_HEAD" != "$LAST_SYNCED_SHA" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            NEW_COUNT=$(git rev-list --count "${LAST_SYNCED_SHA:-$(git rev-parse origin/main)}..upstream/main" 2>/dev/null || echo "?")
            echo "Found ${NEW_COUNT} new upstream commit(s) since last sync."
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No new upstream commits since last sync."
          fi

          # Check if upstream has cut a new release since we last synced.
          # Only auto-bump our tag when upstream releases — not on every commit.
          LAST_UPSTREAM_RELEASE=$(gh release list --repo binaricat/netcatty --limit 1 \
            --json tagName --jq ".[0].tagName" 2>/dev/null || echo "")
          LAST_SYNCED_RELEASE=""
          if [ -f .upstream-release ]; then
            LAST_SYNCED_RELEASE=$(cat .upstream-release)
          fi

          echo "Last upstream release:        ${LAST_UPSTREAM_RELEASE:-none}"
          echo "Last synced upstream release: ${LAST_SYNCED_RELEASE:-none}"
          echo "last_upstream_release=${LAST_UPSTREAM_RELEASE}" >> "$GITHUB_OUTPUT"

          if [ -n "$LAST_UPSTREAM_RELEASE" ] && [ "$LAST_UPSTREAM_RELEASE" != "$LAST_SYNCED_RELEASE" ]; then
            echo "new_upstream_release=true" >> "$GITHUB_OUTPUT"
            echo "New upstream release detected: $LAST_UPSTREAM_RELEASE (was: ${LAST_SYNCED_RELEASE:-none})"
          else
            echo "new_upstream_release=false" >> "$GITHUB_OUTPUT"
            echo "No new upstream release (current: ${LAST_UPSTREAM_RELEASE:-none})"
          fi

      - name: Merge upstream
        if: steps.check.outputs.has_changes == 'true'
        run: |
          set -e
          git config user.name "Sensor Sync Bot"
          git config user.email "sensor-bot@hyperspace.ng"

          # Merge upstream/main. We take upstream changes for everything,
          # letting the post-merge rebrand step fix strings and the
          # build.yml patch step fix build-time issues.
          if ! git merge upstream/main --no-edit --no-ff 2>&1; then
            CONFLICTS=$(git diff --name-only --diff-filter=U)
            echo "Conflicts in: $CONFLICTS"
            # Resolve all conflicts by preferring upstream (theirs).
            # Post-merge steps will re-apply Sensor-specific patching.
            git checkout --theirs $CONFLICTS
            git add $CONFLICTS
            git commit --no-edit
            echo "Auto-resolved all conflicts with upstream."
          fi

      - name: Apply Sensor rebrand
        if: steps.check.outputs.has_changes == 'true'
        run: |
          set -e

          # ── String substitutions ───────────────────────────────────────────
          # Replace upstream project name/owner references with Sensor/DrOlu.
          find . -type f \( -name "*.ts" -o -name "*.tsx" -o -name "*.js" -o -name "*.cjs" \
            -o -name "*.mjs" -o -name "*.json" -o -name "*.md" -o -name "*.yml" \
            -o -name "*.yaml" \) \
            ! -path "./.git/*" \
            ! -path "./node_modules/*" \
            -exec sed -i \
              -e 's|binaricat/netcatty|DrOlu/Sensor|g' \
              -e 's|binaricat/Sensor|DrOlu/Sensor|g' \
              {} +

          # ── Sensor-specific file patches ───────────────────────────────────
          # Patch 1: useSensorMonacoTheme shim
          # ScriptCodeEditor.tsx imports this path; upstream only ships
          # useNetcattyMonacoTheme.ts which already exports the function
          # under the Sensor name. Add a re-export shim if missing.
          SHIM="infrastructure/monaco/useSensorMonacoTheme.ts"
          if [ ! -f "$SHIM" ]; then
            echo "// Re-export shim — ScriptCodeEditor.tsx imports from this path." > "$SHIM"
            echo "export { useSensorMonacoTheme } from './useNetcattyMonacoTheme';" >> "$SHIM"
            echo "[rebrand] Created $SHIM"
          fi

          # Patch 2: generate-release-note release script — owner in repo path
          if [ -f ".github/scripts/generate-release-note.js" ]; then
            sed -i "s|binaricat/netcatty|DrOlu/Sensor|g; s|binaricat/Sensor|DrOlu/Sensor|g" \
              .github/scripts/generate-release-note.js
          fi

          echo "Rebrand applied."

      - name: Commit and push
        if: steps.check.outputs.has_changes == 'true'
        run: |
          set -e
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit after rebrand."
          else
            UPSTREAM_SHA=$(git rev-parse --short upstream/main)
            UPSTREAM_RELEASE="${{ steps.check.outputs.last_upstream_release }}"
            if [ -n "$UPSTREAM_RELEASE" ]; then
              echo "$UPSTREAM_RELEASE" > .upstream-release
              git add .upstream-release
            fi
            git commit -m "sync: upstream Netcatty @ ${UPSTREAM_SHA} (rebranded)"
            git push origin main
            echo "Pushed sync commit."
          fi

      - name: Create or auto-bump release tag
        # Trigger when:
        #  a) create_tag was given manually, OR
        #  b) a new upstream release was detected (auto-bump patch version)
        if: >
          github.event.inputs.create_tag != '' ||
          steps.check.outputs.new_upstream_release == 'true'
        run: |
          set -e

          if [ -n "${{ github.event.inputs.create_tag }}" ]; then
            TAG="${{ github.event.inputs.create_tag }}"
            echo "Using manually specified tag: $TAG"
          else
            # Auto-bump: find latest semver tag, increment patch.
            LATEST=$(git tag --list 'v*.*.*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
            if [ -z "$LATEST" ]; then
              LATEST="v1.0.0"
              echo "No existing semver tag found — starting at $LATEST"
            fi
            MAJOR=$(echo "$LATEST" | cut -d. -f1 | tr -d 'v')
            MINOR=$(echo "$LATEST" | cut -d. -f2)
            PATCH=$(echo "$LATEST" | cut -d. -f3)
            PATCH=$((PATCH + 1))
            TAG="v${MAJOR}.${MINOR}.${PATCH}"
            echo "Auto-bumped: $LATEST → $TAG"
          fi

          # Idempotency guard
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::warning::Tag $TAG already exists locally — skipping."
            exit 0
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::warning::Tag $TAG already exists on origin — skipping."
            exit 0
          fi

          git tag "$TAG"
          git push origin "$TAG"
          echo "✅ Tag $TAG pushed — build-packages workflow will trigger and publish the release."

          # Record upstream release so next run doesn't re-tag.
          UPSTREAM_RELEASE="${{ steps.check.outputs.last_upstream_release }}"
          if [ -n "$UPSTREAM_RELEASE" ]; then
            git config user.name "Sensor Sync Bot"
            git config user.email "sensor-bot@hyperspace.ng"
            echo "$UPSTREAM_RELEASE" > .upstream-release
            git add .upstream-release
            if ! git diff --cached --quiet; then
              git commit -m "chore: record upstream release $UPSTREAM_RELEASE in .upstream-release"
              git push origin main
              echo "Updated .upstream-release to $UPSTREAM_RELEASE."
            fi
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Sync Upstream Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.check.outputs.has_changes }}" = "true" ]; then
            UPSTREAM_SHA=$(git rev-parse --short upstream/main 2>/dev/null || echo "N/A")
            echo "✅ Merged upstream changes (binaricat/netcatty@${UPSTREAM_SHA}) and applied Sensor rebrand." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⏭️ No new upstream commits found." >> "$GITHUB_STEP_SUMMARY"
          fi
          NEW_RELEASE="${{ steps.check.outputs.new_upstream_release }}"
          if [ "$NEW_RELEASE" = "true" ]; then
            echo "🚀 New upstream release detected — auto-bump tag pushed." >> "$GITHUB_STEP_SUMMARY"
          fi
